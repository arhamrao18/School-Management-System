{% extends 'add/base.html' %}
{% block title %}Update Teacher{% endblock %}
{% block breadcrumb %}Update Teacher{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header text-white" style="background:linear-gradient(135deg,#0891b2,#0e7490)">
        <i class="bi bi-person-gear me-2"></i>Teacher Update — {{ teacher.First_Name }} {{ teacher.Last_Name }}
      </div>
      <div class="card-body p-4">
        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">First Name</label>
              <input type="text" name="First_Name" class="form-control" value="{{ teacher.First_Name }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Last Name</label>
              <input type="text" name="Last_Name" class="form-control" value="{{ teacher.Last_Name }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" name="Email" class="form-control" value="{{ teacher.Email }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Contact</label>
              <input type="text" name="Contact" class="form-control" value="{{ teacher.Contact }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Qualification</label>
              <input type="text" name="Qualification" class="form-control" value="{{ teacher.Qualification }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Specialization <small class="text-muted">(comma separated)</small></label>
              <input type="text" name="specialization" class="form-control"
                     value="{{ teacher.specialization }}" placeholder="e.g. Mathematics, Physics">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Address</label>
              <input type="text" name="Address" class="form-control" value="{{ teacher.Address }}">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Photo Update</label>
              <input type="file" name="image" class="form-control" accept="image/*">
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-info text-white px-4"><i class="bi bi-save me-2"></i>Save</button>
            <a href="{% url 'Teacher' %}" class="btn btn-outline-secondary px-4">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

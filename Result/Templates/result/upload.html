<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Marks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card-custom {
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .table thead {
            background: #0d6efd;
            color: white;
        }

        .table tbody tr:hover {
            background: #eef4ff;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-submit {
            border-radius: 10px;
            padding: 10px 25px;
        }

        h2 {
            font-weight: bold;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-input {
            width: 150px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card card-custom p-4">

         <form method="POST">
            {% csrf_token %}
        <!-- Top Section -->
        <div class="top-bar mb-3">
            <h2>Upload Student Marks</h2>

            <!-- Total Marks Input -->
            <div>
                <label class="form-label fw-bold">Total Marks</label>
                <input type="number" name="total_marks" class="form-control total-input" placeholder="e.g 100" required>
            </div>
        </div>



            <div class="table-responsive">
                <table class="table table-hover align-middle text-center">

                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Roll No</th>
                            <th>Name</th>
                            <th>Class</th>
                            <th style="width: 150px;">Marks</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for student in Students %}
                        <tr>
                            <td>{{ forloop.counter }}</td>
                            <td>{{ student.Roll }}</td>
                            <td>{{ student.Name }}</td>
                            <td>{{ student.section.grade }} - {{ student.section.section }}</td>
                            <td>
                                <input type="number"
                                       name="marks_{{ student.id }}"
                                       class="form-control text-center"
                                       placeholder="Marks"
                                       min="0" required>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>

                </table>
            </div>

            <div class="text-end mt-3">
                <button type="submit" class="btn btn-primary btn-submit">
                    Submit Marks
                </button>
            </div>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

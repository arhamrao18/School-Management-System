<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GV School{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5; --primary-d: #3730a3;
      --success: #059669; --bg: #f1f5f9;
    }
    body { background: var(--bg); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

    /* ── Navbar ── */
    .stu-navbar {
      background: linear-gradient(135deg, #1e1b4b, #4f46e5);
      padding: .75rem 1.5rem;
      box-shadow: 0 2px 12px rgba(79,70,229,.4);
    }
    .stu-navbar .navbar-brand { font-weight: 700; font-size: 1.15rem; color: #fff; }
    .stu-navbar .nav-link { color: rgba(255,255,255,.8) !important; font-weight: 500;
      border-radius: 8px; padding: .45rem .9rem !important; transition: .2s; }
    .stu-navbar .nav-link:hover, .stu-navbar .nav-link.active {
      background: rgba(255,255,255,.18); color: #fff !important; }
    .stu-navbar .nav-link i { margin-right: 5px; }

    /* ── Cards ── */
    .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }

    /* ── Buttons ── */
    .btn { border-radius: 9px; }
    .btn-primary { background: var(--primary); border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-d); border-color: var(--primary-d); }

    /* ── Alert ── */
    .alert { border-radius: 10px; border: none; }

    /* ── Form ── */
    .form-control, .form-select { border-radius: 9px; border: 1.5px solid #e2e8f0; }
    .form-control:focus, .form-select:focus {
      border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<!-- Navbar -->
{% if not is_parent %}
<nav class="stu-navbar navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href=" ">
      <i class="bi bi-mortarboard-fill me-2"></i>GV School
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#stuNav">
      <i class="bi bi-list text-white fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="stuNav">
      <ul class="navbar-nav me-auto gap-1 mt-2 mt-lg-0">
        <li class="nav-item">
          <a class="nav-link {% block nav_home %}{% endblock %}" href="/stu/menue/{{ request.session.ID }}/">
            <i class="bi bi-house"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% block nav_result %}{% endblock %}" href="{% url 'Result' %}">
            <i class="bi bi-bar-chart"></i>  Result
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% block nav_att %}{% endblock %}" href="{% url 'StuAttendance' %}">
            <i class="bi bi-calendar-check"></i> Attendance
          </a>
        </li>
      </ul>

      <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle"></i> My Account
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="{% url 'Self' %}">
              <i class="bi bi-person me-2"></i>Profile
            </a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="{% url 'Out' %}">
              <i class="bi bi-box-arrow-right me-2"></i>Logout
            </a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
{%endif%}
<!-- Messages -->
<div class="container mt-3">
  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags }} alert-dismissible fade show">
    <i class="bi bi-info-circle me-2"></i>{{ msg }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
</div>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>

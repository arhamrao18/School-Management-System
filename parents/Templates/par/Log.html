<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Student Login — GV School</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e1b4b 0%, #4f46e5 60%, #06b6d4 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-box {
      width: 100%; max-width: 420px;
      background: #fff; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25); overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, #4f46e5, #3730a3);
      padding: 2rem; text-align: center; color: #fff;
    }
    .login-icon {
      width: 72px; height: 72px; background: rgba(255,255,255,.2);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 1rem; font-size: 2rem;
    }
    .form-control { border-radius: 10px; border: 1.5px solid #e2e8f0; padding: .7rem 1rem; }
    .form-control:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
    .btn-login {
      background: linear-gradient(135deg, #4f46e5, #3730a3);
      border: none; border-radius: 10px; padding: .75rem; font-weight: 600;
      width: 100%; color: #fff; transition: .2s;
    }
    .btn-login:hover { opacity: .9; transform: translateY(-1px); }
    .other-links { text-align: center; padding: 1rem; background: #f8faff; }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-header">
    <div class="login-icon"><i class="bi bi-person-circle"></i></div>
    <h4 class="mb-1 fw-bold">Student Login</h4>
    <p class="mb-0 small" style="opacity:.8">GV School Management System</p>
  </div>
  <div class="p-4">
    {% for msg in messages %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
      <i class="bi bi-exclamation-circle me-2"></i>{{ msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">CNIC</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="ID" class="form-control" placeholder="Enter your CNIC Number" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login
      </button>
    </form>
  </div>
  <div class="other-links">
    <small class="text-muted">
      Teacher? <a href="{% url 'Log' %}" class="text-primary fw-semibold">Teacher Login</a>
    </small>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

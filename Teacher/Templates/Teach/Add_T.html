<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Add Teacher</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f1f5f9; font-family:'Segoe UI',sans-serif; }
    .card { border:none; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,.07); }
    .form-control, .form-select { border-radius:9px; border:1.5px solid #e2e8f0; }
    .form-control:focus, .form-select:focus { border-color:#4f46e5; box-shadow:0 0 0 3px rgba(79,70,229,.12); }
    .btn { border-radius:9px; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="mb-3">
        <a href="{% url 'Home' %}" class="btn btn-outline-secondary btn-sm">← Admin Dashboard</a>
      </div>
      {% for msg in messages %}
      <div class="alert alert-success alert-dismissible fade show">{{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}
      <div class="card">
        <div class="card-header text-white" style="background:linear-gradient(135deg,#312e81,#4f46e5)">
          <i class="bi bi-person-plus me-2"></i>Add New Teacher
        </div>
        <div class="card-body p-4">
          <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label fw-semibold">Employee ID *</label>
                <input type="text" name="Employee_ID" class="form-control" placeholder="e.g. T007" required>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">First Name *</label>
                <input type="text" name="First_Name" class="form-control" required>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Last Name *</label>
                <input type="text" name="Last_Name" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Email *</label>
                <input type="email" name="Email" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Contact *</label>
                <input type="text" name="Contact" class="form-control" placeholder="03XX-XXXXXXX" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Qualification *</label>
                <input type="text" name="Qualification" class="form-control" placeholder="e.g. MSc Mathematics" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Specialization
                  <small class="text-muted">(For auto-assign)</small>
                </label>
                <input type="text" name="specialization" class="form-control"
                       placeholder="e.g. Mathematics, Physics (comma separated)">
                  <label class="form-label fw-semibold">Tittle

                </label>
                <input type="text" name="tittle" class="form-control"
                       placeholder="e.g. Lecturer, Head (comma separated)">
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Address</label>
                <input type="text" name="Address" class="form-control">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Login Password *</label>
                <input type="text" name="password" class="form-control" placeholder="Teacher login password" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Photo</label>
                <input type="file" name="image" class="form-control" accept="image/*">
              </div>
            </div>
            <div class="d-flex gap-2 mt-4">
              <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-save me-2"></i>Add Teacher
              </button>
              <button type="reset" class="btn btn-outline-secondary">Reset</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

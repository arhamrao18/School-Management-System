<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Teacher Portal — GV School{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --primary:#4f46e5; --dark:#1e1b4b; }
    body { background: #f1f5f9; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    .t-navbar {
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      padding: .75rem 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }
    .t-navbar .navbar-brand { font-weight: 700; color: #fff; font-size: 1.1rem; }
    .t-navbar .nav-link { color: rgba(255,255,255,.8) !important; border-radius: 8px;
      padding: .45rem .9rem !important; transition: .2s; font-weight: 500; }
    .t-navbar .nav-link:hover { background: rgba(255,255,255,.15); color: #fff !important; }
    .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    .btn { border-radius: 9px; }
    .form-control, .form-select { border-radius: 9px; border: 1.5px solid #e2e8f0; }
    .form-control:focus, .form-select:focus {
      border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
    .alert { border-radius: 10px; border: none; }
    .att-label { cursor: pointer; }
    .att-radio { display: none; }
    .att-btn {
      display: inline-block; padding: .35rem .85rem; border-radius: 20px;
      font-size: .82rem; font-weight: 600; border: 2px solid #dee2e6;
      background: #f8f9fa; transition: .15s; user-select: none;
    }
    .att-radio:checked + .p-btn { background:#dcfce7; border-color:#16a34a; color:#14532d; }
    .att-radio:checked + .a-btn { background:#fee2e2; border-color:#dc2626; color:#7f1d1d; }
    .att-radio:checked + .l-btn { background:#fef3c7; border-color:#ca8a04; color:#713f12; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
<nav class="t-navbar navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="#"><i class="bi bi-mortarboard-fill me-2"></i>Teacher Portal</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#tNav">
      <i class="bi bi-list text-white fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="tNav">
      <ul class="navbar-nav me-auto gap-1 mt-2 mt-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="/tech/board/{{ request.session.ID }}/"><i class="bi bi-house me-1"></i>Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/tech/prof/"><i class="bi bi-person-circle me-1"></i>Profile</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
        <li class="nav-item">
          <a class="nav-link text-danger" href="{% url 'Logout' %}"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags }} alert-dismissible fade show mb-3">
    <i class="bi bi-info-circle me-2"></i>{{ msg }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
